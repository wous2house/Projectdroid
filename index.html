
<!DOCTYPE html>
<html lang="nl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectdroid</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <script>
        window.tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              fontFamily: {
                sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                subtitle: ['"DM Sans"', 'sans-serif'],
              },
              colors: {
                primary: {
                  DEFAULT: '#3E77E9',
                  hover: '#2364E7',
                  soft: 'rgba(62, 119, 233, 0.15)',
                },
                secondary: {
                  DEFAULT: '#FFD656',
                  hover: '#FFCC33',
                },
                success: {
                  DEFAULT: '#4FC775',
                  hover: '#3BBA63',
                  soft: 'rgba(79, 199, 117, 0.2)',
                },
                warning: {
                  DEFAULT: '#FFAE52',
                  hover: '#FF961F',
                  soft: 'rgba(255, 179, 92, 0.2)',
                },
                danger: {
                  DEFAULT: '#FF5952',
                  hover: '#FF3A33',
                  soft: 'rgba(255, 89, 82, 0.2)',
                },
                info: {
                  DEFAULT: '#644CA2',
                  hover: '#56418B',
                  soft: 'rgba(100, 76, 162, 0.2)',
                },
                light: '#F1F5F9',
                dark: '#020817',
                'dark-card': '#0B1E3F',
                'text-main': '#0F172A',
                'text-muted': '#64748B', 
                'headings': '#3E77E9'
              },
              borderRadius: {
                '4xl': '2rem',
                '5xl': '2.5rem',
              },
              boxShadow: {
                'card-hover': '0 20px 25px -5px rgba(62, 119, 233, 0.1), 0 10px 10px -5px rgba(62, 119, 233, 0.04)',
              }
            }
          }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }
        .square-logo {
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        .dark ::-webkit-scrollbar-track {
            background: #020817;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .dark .text-muted {
            color: #94a3b8; 
        }

        .rich-content ul {
            list-style-type: disc !important;
            margin-left: 1.5rem !important;
            margin-top: 0.75rem !important;
            margin-bottom: 0.75rem !important;
            display: block !important;
        }
        .rich-content ol {
            list-style-type: decimal !important;
            margin-left: 1.5rem !important;
            margin-top: 0.75rem !important;
            margin-bottom: 0.75rem !important;
            display: block !important;
        }
        .rich-content li {
            margin-bottom: 0.5rem !important;
            display: list-item !important;
        }
        .rich-content b, .rich-content strong {
            font-weight: 800 !important;
        }
        .rich-content a {
            color: #3E77E9 !important;
            text-decoration: underline !important;
            font-weight: 700 !important;
        }
        .dark .rich-content a {
            color: #60a5fa !important;
        }
        
        [contenteditable]:empty:before {
            content: attr(data-placeholder);
            color: #94a3b8;
            pointer-events: none;
            display: block;
        }
        .dark [contenteditable]:empty:before {
            color: rgba(255,255,255,0.4);
        }

        @keyframes shrink {
            0% { width: 100%; }
            100% { width: 0%; }
        }
        .animate-\\[shrink_3s_linear_forwards\\] {
            animation: shrink 3s linear forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {

    "date-fns/": "https://esm.sh/date-fns@4.1.0/",
    "date-fns/locale": "https://esm.sh/date-fns/locale?bundle",
    "express": "https://esm.sh/express@4.21.2",
    "body-parser": "https://esm.sh/body-parser@1.20.3",
    "url": "https://esm.sh/url@0.11.4",
    "vite": "https://esm.sh/vite@6.1.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@4.3.4",
    "@google/genai": "https://esm.sh/@google/genai@1.38.0",
    "electron": "https://esm.sh/electron@34.0.2",
    "fs": "https://esm.sh/fs@^0.0.1-security",
    "path": "https://esm.sh/path@^0.12.7",
    "child_process": "https://esm.sh/child_process@^1.0.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 dark:bg-dark text-text-main dark:text-light transition-colors duration-300 antialiased">

</body>
</html>
